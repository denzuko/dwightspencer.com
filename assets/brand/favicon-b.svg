<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Eye in lens, 25° — Version B: cropped, lens overflows frame. dwightaspencer.com -->
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="160" height="160" rx="20"/></clipPath>
  </defs>
  <rect x="0" y="0" width="160" height="160" rx="20" fill="#111"/>
  <circle cx="80" cy="80" r="94" fill="#fffdfa" clip-path="url(#frame)"/>
  <circle cx="80" cy="80" r="82" fill="#111" clip-path="url(#frame)"/>
  <ellipse cx="80" cy="80" rx="72" ry="42" fill="#fffdfa" transform="rotate(-25 80 80)" clip-path="url(#frame)"/>
  <circle cx="80" cy="80" r="32" fill="#111" clip-path="url(#frame)"/>
  <circle cx="80" cy="80" r="16" fill="#fffdfa" clip-path="url(#frame)"/>
  <circle cx="80" cy="80" r="6" fill="#111" clip-path="url(#frame)"/>
  <circle cx="72" cy="74" r="3.5" fill="#fffdfa" clip-path="url(#frame)"/>
