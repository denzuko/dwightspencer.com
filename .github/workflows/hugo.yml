name: Deploy Hugo site

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: '0.129.0'
          extended: true

      - name: Copy brand assets from submodule
        run: |
          mkdir -p hugo/static/css hugo/static/assets/brand hugo/data
          cp brand/static/css/brand.css hugo/static/css/brand.css
          cp -r brand/static/assets/. hugo/static/assets/brand/
          cp brand/data/brand.yaml hugo/data/brand.yaml

      - name: Build (first pass)
        working-directory: hugo
        run: hugo --minify --gc

      - name: Generate per-post OG images
        working-directory: hugo
        run: |
          npx --yes playwright install --with-deps chromium 2>/dev/null
          mkdir -p static/assets/og
          for card in $(find public/posts -name 'og-card.html' 2>/dev/null); do
            slug=$(echo "$card" | sed 's|public/posts/||;s|/og-card.html||')
            npx playwright screenshot \
              --browser chromium \
              --viewport-size "1200,630" \
              "file://$(pwd)/$card" \
              "static/assets/og/${slug}.png" 2>/dev/null || true
          done
          echo "OG images: $(ls static/assets/og/*.png 2>/dev/null | wc -l)"

      - name: Build (second pass)
        working-directory: hugo
        run: hugo --minify --gc

      - name: Package Quicklisp dist via redist
        run: |
          sudo apt-get install -y -qq libarchive-tools

          # Download redist precompiled binary from Codeberg (moved from shirakumo.org)
          REDIST_URL="https://codeberg.org/shirakumo/redist/releases/download/v2.0.12/redist-linux.zip"
          curl -fsSL "$REDIST_URL" -o /tmp/redist.zip
          unzip -q /tmp/redist.zip -d /tmp/redist-bin
          chmod +x /tmp/redist-bin/redist
          REDIST=/tmp/redist-bin/redist

          # Stage lisp source files + Hugo-generated corpus.lisp into a local git repo
          # redist requires a cloneable source; we can't use the main repo (gh-pages default branch)
          mkdir -p /tmp/lisp-src/DwightASpencerCom
          cp hugo/static/lisp/*.lisp hugo/static/lisp/*.asd \
             /tmp/lisp-src/DwightASpencerCom/
          cp hugo/public/corpus.lisp \
             /tmp/lisp-src/DwightASpencerCom/corpus.lisp

          git -C /tmp/lisp-src init -b master
          git -C /tmp/lisp-src config user.email "ci@dapla.net"
          git -C /tmp/lisp-src config user.name "CI"
          git -C /tmp/lisp-src add .
          git -C /tmp/lisp-src commit -m "release"

          # Run redist: add-dist, add project from local git, compile
          export STORAGE_FILE=/tmp/redistout/distinfo.sexp
          export DIST_OUTPUT_DIR=/tmp/redistout/releases
          mkdir -p /tmp/redistout

          $REDIST add-dist DwightASpencerCom \
            --url "http://dwightaspencer.com/lisp"
          $REDIST add "file:///tmp/lisp-src" \
            --name DwightASpencerCom \
            --verbose
          $REDIST compile -v

          # Copy redist output into Hugo public dir
          mkdir -p hugo/public/lisp
          cp -r /tmp/redistout/releases/. hugo/public/lisp/

          # Mirror canonical distinfo at /distinfo.txt for legacy clients
          cp /tmp/redistout/releases/dwightaspencercom.txt hugo/public/distinfo.txt

          # Fix redist HTML index hrefs
          # redist hardcodes root-relative hrefs (e.g. /dwightaspencercom/)
          # but the dist is served under /lisp/. No CLI flag exists for this;
          # post-process all generated index.html files to prepend /lisp.
          # Negated match: only rewrite href="/ NOT already starting with /lisp/
          # sed: match href="/ followed by a char that is not "l" to avoid
          # double-prefixing any href already containing /lisp/.
          find hugo/public/lisp -name "index.html" \
            -exec sed -i 's|href="/\([^l]\)|href="/lisp/\1|g' {} +

      - name: Index with Pagefind
        working-directory: hugo
        run: npx --yes pagefind --site public --output-path public/pagefind

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hugo/public
          publish_branch: gh-pages
          cname: dwightaspencer.com
          keep_files: false
