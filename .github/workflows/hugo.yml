name: Deploy Hugo site

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly — picks up publishDate posts
  workflow_dispatch:       # manual deploy button in Actions UI

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: '0.129.0'
          extended: true

      - name: Copy brand assets from submodule
        run: |
          mkdir -p hugo/static/css hugo/static/assets/brand hugo/data
          cp brand/static/css/brand.css hugo/static/css/brand.css
          cp -r brand/static/assets/. hugo/static/assets/brand/
          cp brand/data/brand.yaml hugo/data/brand.yaml

      - name: Build (first pass — generates og-card.html per post)
        working-directory: hugo
        run: hugo --minify --gc

      - name: Generate per-post OG images
        # Playwright screenshots og-card.html → static/assets/og/{slug}.png
        # Must run after first build (og-card.html exists) and before second
        # build so Hugo's fileExists() picks up the images.
        working-directory: hugo
        run: |
          npx --yes playwright install --with-deps chromium 2>/dev/null
          mkdir -p static/assets/og
          for card in $(find public/posts -name 'og-card.html' 2>/dev/null); do
            slug=$(echo "$card" | sed 's|public/posts/||;s|/og-card.html||')
            npx playwright screenshot \
              --browser chromium \
              --viewport-size "1200,630" \
              "file://$(pwd)/$card" \
              "static/assets/og/${slug}.png" 2>/dev/null || true
          done
          echo "OG images generated: $(ls static/assets/og/*.png 2>/dev/null | wc -l)"

      - name: Build (second pass — picks up OG images via fileExists)
        working-directory: hugo
        run: hugo --minify --gc

      - name: Package Quicklisp dist
        working-directory: hugo
        run: |
          set -e
          if [ ! -f "public/corpus.lisp" ]; then
            echo "corpus.lisp not in build output — skipping"
            exit 0
          fi

          VERSION=$(date +%Y-%m-%d)
          RELEASE="DwightASpencerCom-${VERSION}"
          DIST_DIR="static/lisp"
          TGZ="${DIST_DIR}/${RELEASE}.tgz"

          mkdir -p /tmp/qdist/${RELEASE}
          cp ${DIST_DIR}/*.lisp /tmp/qdist/${RELEASE}/ 2>/dev/null || true
          cp ${DIST_DIR}/dwightaspencercom.asd /tmp/qdist/${RELEASE}/dwightaspencercom.asd
          cp public/corpus.lisp /tmp/qdist/${RELEASE}/corpus.lisp

          tar czf /tmp/${RELEASE}.tgz -C /tmp/qdist "${RELEASE}/"
          cp /tmp/${RELEASE}.tgz ${DIST_DIR}/${RELEASE}.tgz

          SIZE=$(wc -c < ${DIST_DIR}/${RELEASE}.tgz)
          MD5=$(md5sum ${DIST_DIR}/${RELEASE}.tgz | cut -d' ' -f1)
          SHA1=$(sha1sum ${DIST_DIR}/${RELEASE}.tgz | cut -d' ' -f1)

          # releases.txt: first line MUST start with # (Quicklisp cdb.lisp requirement)
          printf "# project-name url size md5 sha1 prefix system-files\n"             > ${DIST_DIR}/releases.txt
          printf "%s http://dwightaspencer.com/lisp/%s.tgz %s %s %s %s %s/dwightaspencercom.asd
"             "${RELEASE}" "${RELEASE}" "${SIZE}" "${MD5}" "${SHA1}" "${RELEASE}" "${RELEASE}"             >> ${DIST_DIR}/releases.txt

          # systems.txt: first line MUST start with # (Quicklisp cdb.lisp requirement)
          # system-file must be the path within the tarball without .asd extension
          printf "# project system-file system-name deps\n"             > ${DIST_DIR}/systems.txt
          printf "DwightASpencerCom %s/dwightaspencercom dwightaspencercom named-readtables\n"             "${RELEASE}" >> ${DIST_DIR}/systems.txt

          sed -i "s/^version .*/version ${VERSION}/" static/distinfo.txt 2>/dev/null || true

          mkdir -p public/lisp
          cp ${DIST_DIR}/${RELEASE}.tgz public/lisp/
          cp ${DIST_DIR}/releases.txt public/lisp/releases.txt
          cp ${DIST_DIR}/systems.txt public/lisp/systems.txt 2>/dev/null || true

          echo "Dist packaged: ${SIZE} bytes sha1=${SHA1}"

      - name: Index with Pagefind
        working-directory: hugo
        run: npx --yes pagefind --site public --output-path public/pagefind

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hugo/public
          publish_branch: gh-pages
          cname: dwightaspencer.com
          keep_files: false
