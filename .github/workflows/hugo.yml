name: Deploy Hugo site

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly — picks up publishDate posts
  workflow_dispatch:       # manual deploy button in Actions UI

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: '0.129.0'
          extended: true

      - name: Copy brand assets from submodule
        run: |
          mkdir -p hugo/static/css hugo/static/assets/brand hugo/data
          cp brand/static/css/brand.css hugo/static/css/brand.css
          cp -r brand/static/assets/. hugo/static/assets/brand/
          cp brand/data/brand.yaml hugo/data/brand.yaml

      - name: Build
        working-directory: hugo
        run: hugo --minify --gc

      - name: Snapshot corpus into Quicklisp dist tgz
        working-directory: hugo
        run: |
          # Option B: bundle current corpus.lisp into the tgz at build time
          # The dist version is a versioned snapshot — accurate as of this deploy
          DIST_DIR="static/lisp"
          TGZ=$(ls ${DIST_DIR}/DwightASpencerCom-*.tgz | head -1)
          RELEASE=$(basename "$TGZ" .tgz)
          if [ -f "public/corpus.lisp" ] && [ -f "$TGZ" ]; then
            mkdir -p /tmp/corpus-snap
            tar xzf "$TGZ" -C /tmp/corpus-snap
            cp public/corpus.lisp /tmp/corpus-snap/${RELEASE}/corpus.lisp
            tar czf "$TGZ" -C /tmp/corpus-snap "${RELEASE}/"
            SIZE=$(wc -c < "$TGZ")
            MD5=$(md5sum "$TGZ" | cut -d' ' -f1)
            SHA1=$(tar -xOf "$TGZ" | sha1sum | cut -d' ' -f1)
            echo "DwightASpencerCom http://dwightaspencer.com/lisp/$(basename $TGZ) $SIZE $MD5 $SHA1 ${RELEASE} ${RELEASE}/dwightaspencer.asd" \
              > "${DIST_DIR}/releases.txt"
            cp "$TGZ" "public/lisp/$(basename $TGZ)"
            cp "${DIST_DIR}/releases.txt" "public/lisp/releases.txt"
            echo "Corpus snapshotted into dist: $SIZE bytes"
          fi

      - name: Generate per-post OG images
        working-directory: hugo
        run: |
          npx --yes playwright install --with-deps chromium 2>/dev/null
          mkdir -p public/assets/og
          for card in $(find public/posts -name 'og-card.html' 2>/dev/null); do
            slug=$(echo "$card" | sed 's|public/posts/||;s|/og-card.html||')
            npx playwright screenshot \
              --browser chromium \
              --viewport-size "1200,630" \
              "file://$(pwd)/$card" \
              "public/assets/og/${slug}.png" 2>/dev/null || true
          done
          echo "OG images generated: $(ls public/assets/og/*.png 2>/dev/null | wc -l)"

      - name: Index with Pagefind
        working-directory: hugo
        run: npx --yes pagefind --site public --output-path public/pagefind

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hugo/public
          publish_branch: gh-pages
          cname: dwightaspencer.com
          keep_files: false
