name: Deploy Hugo site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: '0.129.0'
          extended: true

      - name: Build
        working-directory: hugo
        run: hugo --minify --gc

      - name: Index with Pagefind
        working-directory: hugo
        run: npx --yes pagefind --site public --output-path public/pagefind

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: hugo/public
          publish_branch: gh-pages
          cname: dwightaspencer.com
          keep_files: false
