name: Update DID hash

on:
  push:
    branches: [ master ]

jobs:
  bump-did:
    name: Bump DID git hash
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Compute current commit hash
      id: hash
      run: |
        echo "HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Update did.json with current hash
      run: |
        jq --arg h "$HASH" \
          '.verificationMethod[0].digestValue = $h |
           .assertionMethod = ["did:web:dwightaspencer.com#git-hash"] |
           .service[0].description = "Canonical git repo – current commit hash \($h) cryptographically attests site content."' \
          .well-known/did.json > .well-known/did.json.tmp
        mv .well-known/did.json.tmp .well-known/did.json

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if ! git diff --quiet; then
          git add .well-known/did.json
          git commit -m "ci: bump DID git hash to $HASH"
          git push
        else
          echo "did.json up to date"
        fi
