# hugo.toml — dwightaspencer.com
# Hugo 0.129.0+extended

baseURL       = "https://dwightaspencer.com/"
languageCode  = "en"
defaultContentLanguage = "en"
title         = "Dwight Spencer - 0x5DCBF78E3F9C3FE3"
copyright     = "Copyright 2026 Dwight Spencer. All rights reserved. AI training prohibited."

[outputs]
  home    = ["HTML", "RSS", "JSON", "Lisp", "Humans"]
  section = ["HTML", "RSS"]
  page    = ["HTML", "OGCard"]
  term    = ["HTML", "RSS"]
  taxonomy = ["HTML"]


[mediaTypes]
  [mediaTypes."text/humans"]
    suffixes = ["humans"]

  [mediaTypes."text/lisp"]
    suffixes = ["lisp"]

[outputFormats.RSS]
  mediaType    = "application/rss+xml"
  baseName     = "atom"
  rel          = "alternate"
  isPlainText  = false

[outputFormats.JSON]
  mediaType   = "application/json"
  baseName    = "feed"
  rel         = "alternate"
  isPlainText = true

[outputFormats.Humans]
  mediaType    = "text/humans"
  baseName     = "humans"
  isPlainText  = true
  notAlternative = true

[outputFormats.Lisp]
  mediaType    = "text/lisp"
  baseName     = "corpus"
  rel          = "alternate"
  isPlainText  = true
  notAlternative = true

[outputFormats.DistIndex]
  mediaType    = "text/plain"
  baseName     = "dwightaspencer"
  path         = "/"
  rel          = "alternate"
  isPlainText  = true
  notAlternative = true

[taxonomies]
  tag      = "tags"
  category = "categories"
  series   = "series"
  venue    = "venue"

[permalinks]
  posts = "/posts/:slug/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style              = "monokai"
    noClasses          = false
    lineNos            = false
    tabWidth           = 4

[minify]
  minifyOutput = false

[privacy]
  [privacy.googleAnalytics]
    disable = true
  [privacy.disqus]
    disable = true
  [privacy.twitter]
    disable = false
    enableDNT = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

[params]
  author        = "Dwight Spencer"
  authorHandle  = "@denzuko"
  pgp           = "0x5DCBF78E3F9C3FE3"
  orcid         = "0009-0001-0066-4646"
  arxiv         = "https://arxiv.org/a/0009-0001-0066-4646"
  ianapen       = "42387"
  description   = "Systems design, infrastructure sovereignty, and digital civil liberties. Principal, Da Planet Security (est. 2003). Technology Chair, Restore The Fourth."
  siteTitle     = "Dwight Spencer - 0x5DCBF78E3F9C3FE3"
  canonicalBase = "https://dwightaspencer.com"
  tdmPolicy     = "https://dwightaspencer.com/.well-known/tdm-policy.json"

  geoPosition  = "42.6526;-73.7562"
  geoICBM      = "42.6526, -73.7562"
  geoPlacename = "Albany, New York, United States"
  geoRegion    = "US-NY"

  github    = "https://github.com/denzuko"
  linkedin  = "https://linkedin.com/in/denzuko"
  keybase   = "https://keybase.io/Denzuko"
  mastodon  = "https://mastodon.social/@denzuko"
  youtube   = "https://youtube.com/@daplanetsecurity"
  hpr       = "https://hackerpublicradio.org"
  anonradio = "https://anonradio.net"
  calendly  = "https://calendly.com/denzuko/virtual-coffee"
  twitch    = "https://twitch.tv/zekodun"
  reddit    = "https://reddit.com/user/denzuko"

  avatarURL = "https://stream-assets.cdn.dwightaspencer.com/assets/avatar.jpg"
  cf2faVerify = "a39e4b2b07da17e"

  # CTA — swap text/url when Patreon/book/MSP pipelines go live
  # e.g. "Buy the book" / "https://..." or "Hire Da Planet Security" / "https://dapla.net"
  [params.cta]
    text = "One less dependency"
    url  = "https://buymeacoffee.com/denzuko"

[outputFormats.OGCard]
  mediaType    = "text/html"
  baseName     = "og-card"
  rel          = "alternate"
  isPlainText  = false
  notAlternative = true
