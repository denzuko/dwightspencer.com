<!doctype html>
<html lang="{{ .Site.LanguageCode }}" vocab="https://schema.org/" prefix="og: https://ogp.me/ns# dc: https://purl.org/dc/terms/ geo: https://www.w3.org/2003/01/geo/wgs84_pos# aeo: https://data.nfld.nl/aeo/">
  {{- partial "head.html" . }}
  <script>
    /* Theme detection runs in <head> before first paint — eliminates FOUC.
       Sets data-theme on <html> immediately; no flash from dark→light. */
    (function(){
      var t = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', t || (d ? 'dark' : 'light'));
    })();
  </script>
  <body lang="{{ .Site.LanguageCode }}" class="{{ block "bodyclass" . }}{{ end }}">
    <a class="skip-link" href="#main">Skip to main</a>
    <main id="main">
      <div class="content">
        {{- partial "header.html" . }}
        {{- block "main" . }}{{ end }}
        {{- partial "footer.html" . }}
      </div>
    </main>
    <script>
      /* Toggle button wiring — runs after DOM ready */
      document.addEventListener('DOMContentLoaded', function(){
        var btn = document.getElementById('themeToggle');
        if (!btn) return;
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀︎';
        btn.addEventListener('click', function(){
          var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☾' : '☀︎';
        });
      });
    </script>
  </body>
</html>
