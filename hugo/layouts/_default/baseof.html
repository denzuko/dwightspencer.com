<!doctype html>
<html lang="{{ .Site.LanguageCode }}" vocab="https://schema.org/" prefix="og: https://ogp.me/ns# dc: https://purl.org/dc/terms/ geo: https://www.w3.org/2003/01/geo/wgs84_pos# aeo: https://data.nfld.nl/aeo/">
  {{- partial "head.html" . }}
  <script>
    /* Theme detection runs in <head> before first paint — eliminates FOUC.
       Sets data-theme on <html> immediately; no flash from dark→light. */
    (function(){
      var t = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', t || (d ? 'dark' : 'light'));
    })();
  </script>
  <body lang="{{ .Site.LanguageCode }}" class="{{ block "bodyclass" . }}{{ end }}">
    <a class="skip-link" href="#main">Skip to main</a>
    <main id="main">
      <div class="content">
        {{- partial "header.html" . }}
        {{- partial "search.html" . }}
        {{- block "main" . }}{{ end }}
        {{- partial "footer.html" . }}
      </div>
    </main>
    <script>
      /* All post-DOM wiring in one block — avoids CF Rocket Loader type mangling
         that causes inline scripts between content elements to render as visible text. */
      document.addEventListener('DOMContentLoaded', function(){
        /* Theme toggle */
        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀︎';
          btn.addEventListener('click', function(){
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            btn.textContent = next === 'dark' ? '☾' : '☀︎';
          });
        }

        /* Pagefind search — lazy-load on first toggle, Escape to close */
        var wrap = document.getElementById('searchWrap');
        var sbtn = document.getElementById('searchToggle');
        if (wrap && sbtn) {
          var loaded = false;
          function loadPagefind(cb) {
            if (loaded) { if (cb) cb(); return; }
            loaded = true;
            var lnk = document.createElement('link');
            lnk.rel = 'stylesheet';
            lnk.href = '/pagefind/pagefind-ui.css';
            document.head.appendChild(lnk);
            var s = document.createElement('script');
            s.src = '/pagefind/pagefind-ui.js';
            s.onload = function() {
              new PagefindUI({ element: '#search', showImages: false });
              if (cb) cb();
            };
            document.head.appendChild(s);
          }
          sbtn.addEventListener('click', function() {
            var open = wrap.getAttribute('hidden') === null;
            if (open) {
              wrap.setAttribute('hidden', '');
              sbtn.setAttribute('aria-expanded', 'false');
              sbtn.title = 'open search';
            } else {
              wrap.removeAttribute('hidden');
              sbtn.setAttribute('aria-expanded', 'true');
              sbtn.title = 'close search';
              loadPagefind(function() {
                var inp = wrap.querySelector('input');
                if (inp) inp.focus();
              });
            }
          });
          document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && wrap.getAttribute('hidden') === null) {
              wrap.setAttribute('hidden', '');
              sbtn.setAttribute('aria-expanded', 'false');
              sbtn.focus();
            }
          });
        }
      });
    </script>
  </body>
</html>
