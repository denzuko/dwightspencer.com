<!doctype html>
<html lang="{{ .Site.LanguageCode }}" vocab="https://schema.org/" prefix="og: https://ogp.me/ns# dc: https://purl.org/dc/terms/ geo: https://www.w3.org/2003/01/geo/wgs84_pos# aeo: https://data.nfld.nl/aeo/">
  {{- partial "head.html" . }}
  <body lang="{{ .Site.LanguageCode }}" class="{{ block "bodyclass" . }}{{ end }}">
    <a class="skip-link" href="#main">Skip to main</a>
    <main id="main">
      <div class="content">
        {{- partial "header.html" . }}
        {{- block "main" . }}{{ end }}
        {{- partial "footer.html" . }}
      </div>
    </main>
    <script>
      (function(){
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.addEventListener('DOMContentLoaded', function(){
          var btn = document.getElementById('themeToggle');
          if (!btn) return;
          btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☾' : '☀︎';
          btn.addEventListener('click', function(){
            var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            btn.textContent = next === 'dark' ? '☾' : '☀︎';
          });
        });
      })();
    </script>
  </body>
</html>
