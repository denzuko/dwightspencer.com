{{- if .Store.Get "hasMermaid" -}}
<script src="{{ "/js/mermaid.min.js" | relURL }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var darkNow = document.documentElement.getAttribute('data-theme') === 'dark' ||
    (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  mermaid.initialize({
    startOnLoad: true,
    securityLevel: 'strict',
    theme: darkNow ? 'dark' : 'neutral',
    themeVariables: {
      fontFamily: 'share tech mono, monospace',
      fontSize: '13px'
    }
  });
  var btn = document.getElementById('themeToggle');
  if (btn) {
    btn.addEventListener('click', function () {
      window.location.reload();
    });
  }
});
</script>
<style>
.mermaid-figure { margin: 2rem 0; }
.mermaid { text-align: center; overflow-x: auto; }
.mermaid svg { max-width: 100%; height: auto; }
.mermaid-caption {
  text-align: center;
  font-size: .82rem;
  color: #777;
  margin-top: .5rem;
  font-family: share tech mono, monospace;
}
/* Visually hidden but readable by Pagefind and screen readers */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
[data-theme="dark"] .mermaid-caption { color: #666; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .mermaid-caption { color: #666; }
}
</style>
{{- end -}}
